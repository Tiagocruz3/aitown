name: Deploy to Vercel

# Deploys the app to Vercel on every push to main (and on manual dispatch).
# Vercel builds the project on its own infra using app/vercel.json
# (Root Directory = app), so this runner only needs to trigger the deploy.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN        — a Vercel access token (Vercel → Account → Settings → Tokens)
#   VERCEL_ORG_ID       — from app/.vercel/project.json after `vercel link`,
#                         or Vercel → Team Settings → General ("Team ID")
#   VERCEL_PROJECT_ID   — from app/.vercel/project.json after `vercel link`,
#                         or the Project → Settings → General ("Project ID")

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping production deploys racing each other.
concurrency:
  group: vercel-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy (production)
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Vercel secrets are configured
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Missing Vercel secrets. Set VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID in repo settings."
            exit 1
          fi

      # Vercel builds with bun on its own infra (app/vercel.json installCommand).
      # A non-prebuilt deploy uploads the source and lets Vercel build it, which
      # respects the project's Root Directory (app) and env vars.
      - name: Deploy to Vercel
        run: npx --yes vercel@latest deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
