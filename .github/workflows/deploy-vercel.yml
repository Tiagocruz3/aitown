name: Deploy to Vercel

# Deploys the app to Vercel on every push to main (and on manual dispatch).
# Vercel builds the project on its own infra using app/vercel.json
# (Root Directory = app), so this runner only needs to trigger the deploy.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN        — a Vercel access token (Vercel → Account → Settings → Tokens)
#   VERCEL_ORG_ID       — from app/.vercel/project.json after `vercel link`,
#                         or Vercel → Team Settings → General ("Team ID")
#   VERCEL_PROJECT_ID   — from app/.vercel/project.json after `vercel link`,
#                         or the Project → Settings → General ("Project ID")

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping production deploys racing each other.
concurrency:
  group: vercel-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy (production)
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      # Optional path: only deploys when the VERCEL_* secrets are configured.
      # If they're not (e.g. you deploy via Vercel's own dashboard Git
      # integration), this skips cleanly instead of failing the commit.
      - name: Check for Vercel secrets
        id: check
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not set — skipping (deploy is handled by Vercel's dashboard Git integration). Add VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID to enable CI deploys."
          fi

      - name: Deploy to Vercel
        if: steps.check.outputs.configured == 'true'
        run: npx --yes vercel@latest deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"

